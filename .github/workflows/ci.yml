name: CI

# Builds the wrapper and exercises the .NET 8 test suite on both x64 and
# ARM64 Windows runners. The ARM64 leg validates that the bundled win-arm64
# native binaries (Tesseract 5.5.2 + Leptonica 1.87.0 from vcpkg) actually
# load and OCR-process real images — the strongest end-to-end check for the
# multi-arch native packaging introduced alongside this workflow.
#
# windows-11-arm runners are free for public repositories, so the cross-arch
# matrix has no minute-budget impact. Tests target the net8.0 facet of
# TesseractOCR.NetCore31Tests (the project name is historical; it actually
# multi-targets net8.0 + netcoreapp3.1 today, and we skip the latter because
# .NET Core 3.1 is out of support and not installable on ARM64 runners).

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
          - os: windows-11-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Build wrapper
        run: dotnet build TesseractOCR/TesseractOCR.csproj -c Release

      - name: Run tests (.NET 8)
        # Three legacy tests are decorated with [Ignore("...")] in source —
        # see BaseApiTests.GetVersion_Is540, EngineTests.CanPrintVariables,
        # and EngineTests.CanProcessPixUsingResultIterator. Each ignore reason
        # documents what needs to change (version assertion bump, fixture
        # regeneration, locale + EOL tolerant comparison) before re-enabling.
        run: dotnet test TesseractOCR.NetCore31Tests/TesseractOCR.NetCore31Tests.csproj -c Release -f net8.0
